name: Build Signed Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-signed-release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Expo doctor
        run: npx expo-doctor

      - name: Prebuild Android project
        run: pnpm exec expo prebuild --platform android --non-interactive

      - name: Restore Android signing keystore
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || (echo "Missing ANDROID_KEYSTORE_BASE64 secret" && exit 1)
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" || (echo "Missing ANDROID_KEYSTORE_PASSWORD secret" && exit 1)
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}" || (echo "Missing ANDROID_KEY_ALIAS secret" && exit 1)
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}" || (echo "Missing ANDROID_KEY_PASSWORD secret" && exit 1)

          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Configure Gradle signing properties
        shell: bash
        run: |
          cat <<'EOF' >> android/gradle.properties
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: utilz-android-release-apk-${{ github.ref_name || github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload ProGuard and mapping outputs
        uses: actions/upload-artifact@v4
        with:
          name: utilz-android-release-symbols-${{ github.ref_name || github.run_number }}
          path: |
            android/app/build/outputs/mapping/release
            android/app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 30
